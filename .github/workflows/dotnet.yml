name: .NET Web API CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/MiniMart

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Verify BaseEntity is not used
        run: |
          if grep -RInE '\bBaseEntity\b' --include='*.cs' .; then
            echo "BaseEntity is intentionally unused. Remove the inheritance or reference."
            exit 1
          fi

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build
